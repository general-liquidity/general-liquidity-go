name: codegen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: codegen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codegen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache generator jar
        uses: actions/cache@v4
        with:
          path: .codegen-cache
          key: openapi-generator-7.11.0

      - name: Regenerate SDK
        run: bash scripts/generate.sh

      - name: Fail on drift
        run: git diff --exit-code -- client docs api test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
