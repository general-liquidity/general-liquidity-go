      example:
        rotation_chain:
        - signature: signature
          from: from
          to: to
          type: rotation
          rotated_at: 2000-01-23T04:56:07.000+00:00
        - signature: signature
          from: from
          to: to
          type: rotation
          rotated_at: 2000-01-23T04:56:07.000+00:00
        signature:
          public_key: public_key
          value: value
          algorithm: ed25519
        document: "{}"
